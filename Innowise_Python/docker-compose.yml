services:
  postgres:
    image: postgres:15
    container_name: innowise_python_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: innowise_python_postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: